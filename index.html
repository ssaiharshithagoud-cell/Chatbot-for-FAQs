<!DOCTYPE html>
<html>
<head>
    <title>FAQ Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="chat-container">

    <h1>FAQ Chatbot</h1>

    <form method="POST">

        <input type="text"
               name="message"
               placeholder="Ask a question..."
               required>

        <button type="submit">
            Send
        </button>

    </form>

    {% if response %}

    <div class="response">
        <strong>Bot:</strong> {{ response }}
    </div>

    {% endif %}

</div>

</body>
</html>
